<svg viewBox="0 0 600 140" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
  <defs>
    <style>
      .logo-bag { fill: none; stroke: #9b6bff; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .logo-bag-fill { fill: #9b6bff; }
      .logo-text-nova { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 56px; font-weight: 700; fill: #f6f0ff; }
      .logo-text-chance { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 56px; font-weight: 700; fill: #9b6bff; }
      .logo-tagline { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-size: 13px; fill: #cabfe3; letter-spacing: 0.3px; }
    </style>
  </defs>

  <!-- Shopping Bag Icon with modern design -->
  <g transform="translate(25, 15)">
    <!-- Outer bag body -->
    <path class="logo-bag" d="M 8 18 L 8 38 Q 8 44 14 44 L 36 44 Q 42 44 42 38 L 42 18" fill="none"/>
    
    <!-- Bag handles -->
    <path class="logo-bag" d="M 18 18 Q 18 6 26 6 Q 34 6 34 18" fill="none"/>
    
    <!-- Inner check circle -->
    <circle cx="26" cy="28" r="10" class="logo-bag-fill" opacity="0.2"/>
    
    <!-- Check mark -->
    <g transform="translate(26, 28)">
      <path d="M -5 0 L -1 4 L 5 -3" stroke="#9b6bff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Text: NovaChance -->
  <text x="90" y="62" class="logo-text-nova">Nova</text>
  <text x="290" y="62" class="logo-text-chance">Chance</text>

  <!-- Tagline -->
  <text x="90" y="83" class="logo-tagline">A forma inteligente de conquistar mais pagando menos.</text>
</svg>